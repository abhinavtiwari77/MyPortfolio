<div
    class="button bg-white  dark:bg-gray-800 rounded-[30px] relative h-[280px] hover:shadow-lg p-4 md:px-6 pb-20 overflow-visible ">
    <div
        class="bg-[#98d0ff]  dark:bg-gray-800 rounded-bl-full w-48 h-44 absolute top-0 right-0 flex items-center justify-center">
    </div>
    <button (click)="confettiService.celebrate()">
        <img class="w-16 lg:w-16 relative" src="assets/img/Party popper.svg" alt="">
    </button>
    <h2 class="font-bold font-playwrite text-[24px] lg:text-[26px] relative typing-demo text-sky-800 dark:text-white">Get In Touch :
    </h2>
    <p class="font-medium text-sky-700 dark:text-gray-300 flex flex-wrap items-center relative mt-3 gap-2 text-sm">
        <span class="flex items-center gap-1">
            <span class="text-sm">Contact:</span>
            <span class="text-sm">abhinavt00001&#64;gmail.com</span>
        </span>

        <button class="btn-copy p-1.5 rounded-lg bg-sky-100 dark:bg-gray-700 hover:bg-sky-200 dark:hover:bg-gray-600 transition-colors flex-shrink-0" [cdkCopyToClipboard]="value" (click)="confettiService.fireworks()">
            <span data-text-end="Copied!" data-text-initial="Copy to clipboard" class="cp-tooltip"></span>
            <span>
                <svg xml:space="preserve" style="enable-background:new 0 0 512 512" viewBox="0 0 6.35 6.35" y="0" x="0"
                    height="22" width="22" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1"
                    xmlns="http://www.w3.org/2000/svg" class="cp-clipboard">
                    <g>
                        <path fill="currentColor" class="text-sky-700 dark:text-gray-300"
                            d="M2.43.265c-.3 0-.548.236-.573.53h-.328a.74.74 0 0 0-.735.734v3.822a.74.74 0 0 0 .735.734H4.82a.74.74 0 0 0 .735-.734V1.529a.74.74 0 0 0-.735-.735h-.328a.58.58 0 0 0-.573-.53zm0 .529h1.49c.032 0 .049.017.049.049v.431c0 .032-.017.049-.049.049H2.43c-.032 0-.05-.017-.05-.049V.843c0-.032.018-.05.05-.05zm-.901.53h.328c.026.292.274.528.573.528h1.49a.58.58 0 0 0 .573-.529h.328a.2.2 0 0 1 .206.206v3.822a.2.2 0 0 1-.206.205H1.53a.2.2 0 0 1-.206-.205V1.529a.2.2 0 0 1 .206-.206z">
                        </path>
                    </g>
                </svg>
                <svg xml:space="preserve" style="enable-background:new 0 0 512 512" viewBox="0 0 24 24" y="0" x="0"
                    height="22" width="22" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1"
                    xmlns="http://www.w3.org/2000/svg" class="cp-check-mark">
                    <g>
                        <path data-original="#000000" fill="#00b708"
                            d="M9.707 19.121a.997.997 0 0 1-1.414 0l-5.646-5.647a1.5 1.5 0 0 1 0-2.121l.707-.707a1.5 1.5 0 0 1 2.121 0L9 14.171l9.525-9.525a1.5 1.5 0 0 1 2.121 0l.707.707a1.5 1.5 0 0 1 0 2.121z">
                        </path>
                    </g>
                </svg>
            </span>
        </button>
        <!-- <button [cdkCopyToClipboard]="value" class="ml-2" (click)="confettiService.celebrate()">
            <img src="assets/img/copyclip.svg" alt="Copy icon" class="w-5 h-5">
        </button> -->
    </p>
    <div class="flex items-center font-medium text-sky-700 dark:text-gray-300 relative mt-2 text-sm">
        <a href="https://github.com/abhinavtiwari77/Portfolio"
            cdkCopyToClipboard="https://github.com/abhinavtiwari77/Portfolio"
            class="flex items-center flex-wrap gap-1">
            <span>Star my project if you like!</span>
            <img src="assets/img/star.gif" class="w-10 lg:w-10" alt="star">
        </a>
    </div>


    <div class="h-44 flex justify-start">
        <form action="mailto:abhinavt00001@gmail.com" method="post" enctype="text/plain" class="form" data-form
            target="_blank">
            <button
                class="Btn bg-white duration-500 dark:bg-gray-700 absolute truncate m-4 whitespace-nowrap left-0 bottom-0  w-10 h-10 hover:w-[135px] hover:pl-2 flex justify-center items-center hover:justify-start rounded-full cursor-pointer ring-1 hover:ring-4 ring-gray-200 dark:ring-gray-400">
                <img class="w-5 lg:w-5" src="assets/img/arrow.svg" alt="">
                <div class="text">Contact Me</div>
            </button>
        </form>
    </div>
</div>
