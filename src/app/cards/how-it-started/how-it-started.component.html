<div
    class="bg-gradient-to-br from-blue-50 to-purple-50 dark:bg-gradient-to-br dark:from-gray-800 dark:to-gray-900 col-span-2 md:col-span-1 lg:col-span-2 rounded-[30px] p-6 lg:p-10 min-h-[280px] flex flex-col justify-between hover:shadow-2xl hover:scale-[1.02] transition-all duration-300 bg-cover bg-center relative overflow-hidden">
    
    <!-- Decorative floating icons -->
    <div class="absolute top-4 right-4 opacity-20 dark:opacity-10">
        <svg class="w-12 h-12 text-sky-600 animate-bounce" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
        </svg>
    </div>
    
    <div class="absolute bottom-20 left-6 opacity-10 dark:opacity-5">
        <svg class="w-16 h-16 text-purple-600" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
        </svg>
    </div>

    <div class="relative z-10">
        <div class="inline-block mb-3 px-4 py-1 bg-sky-100 dark:bg-sky-900/30 rounded-full">
            <span class="text-xs font-semibold text-sky-700 dark:text-sky-300 uppercase tracking-wide">Journey</span>
        </div>
        <h2 class="font-bold font-playwrite text-sky-800 dark:text-white text-[25px] lg:text-[32px] leading-tight mb-3">{{headding}}</h2>
        <p class="font-medium text-sky-700 dark:text-gray-300 md:mt-2 text-base leading-relaxed">{{how}}</p>
    </div>
    
    <div class="flex justify-between items-center relative z-10 mt-4">
        <a routerLink="/about">
            <button
                class="group rounded-full bg-sky-600 hover:bg-sky-700 dark:bg-sky-700 dark:hover:bg-sky-600 text-white relative flex items-center gap-2 hover:ring-4 ring-sky-200 dark:ring-sky-900 p-3 px-6 shadow-lg hover:shadow-xl hover:scale-105 transition-all duration-300 ease-in-out">
                <span class="font-semibold">Read More</span>
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                </svg>
            </button>
        </a>
        <div class="flex items-center gap-2 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm px-4 py-2 rounded-full">
            <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
            </svg>
            <p class="text-sm font-medium text-gray-600 dark:text-gray-300">{{date}}</p>
        </div>
    </div>
</div>
